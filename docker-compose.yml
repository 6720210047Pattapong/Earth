version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: g08_app
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: earth_db
      MYSQL_USER: earth
      MYSQL_PASSWORD: earth123
    ports:
      - "3008:3008"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

volumes:
  mysql_data: